<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mercy House Cup</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass-vial {
      background:
        linear-gradient(90deg, rgba(255,255,255,.28), rgba(255,255,255,.04) 18%, rgba(255,255,255,.02) 55%, rgba(255,255,255,.18));
      box-shadow:
        inset 8px 0 14px rgba(255,255,255,.22),
        inset -10px 0 18px rgba(0,0,0,.55),
        0 0 22px rgba(255,255,255,.18);
    }

    .sparkle {
      background-image: radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);
      background-size: 14px 14px;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 0 0; }
      to { background-position: 30px -80px; }
    }
  </style>
</head>

<body class="bg-black">

<div class="relative min-h-screen overflow-hidden font-serif text-white">

  <!-- Background -->
  <div 
    class="absolute inset-0 bg-cover bg-center"
    style="background-image: url('images/background.png');">
  </div>

  <div class="absolute inset-0 bg-black/35"></div>

  <!-- Main content -->
  <div class="relative z-10 min-h-screen flex items-end justify-center px-8 pb-10 pt-40">

    <div class="grid grid-cols-7 gap-8 w-full max-w-[1700px] items-end text-center">

      <!-- BRADÁN -->
      <div class="house" data-points="245" data-max="500">
        <img src="images/bradan.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(59,130,246,.8)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-blue-900 via-blue-500 to-cyan-200 shadow-[0_0_28px_rgba(59,130,246,.9)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Bradán</p>
      </div>

      <!-- BROC -->
      <div class="house" data-points="180" data-max="500">
        <img src="images/broc.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(209,213,219,.7)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-zinc-800 via-zinc-400 to-white shadow-[0_0_28px_rgba(229,231,235,.75)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Broc</p>
      </div>

      <!-- IOLAR -->
      <div class="house" data-points="320" data-max="500">
        <img src="images/iolar.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(99,102,241,.8)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-indigo-950 via-indigo-600 to-violet-300 shadow-[0_0_28px_rgba(99,102,241,.9)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Iolar</p>
      </div>

      <!-- GIORRIA -->
      <div class="house" data-points="210" data-max="500">
        <img src="images/giorria.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(34,197,94,.8)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-green-950 via-green-500 to-lime-300 shadow-[0_0_28px_rgba(34,197,94,.9)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Giorria</p>
      </div>

      <!-- CÚ FAOIL -->
      <div class="house" data-points="390" data-max="500">
        <img src="images/cu-faoil.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(226,232,240,.85)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-slate-800 via-slate-300 to-white shadow-[0_0_28px_rgba(226,232,240,.9)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Cú Faoil</p>
      </div>

      <!-- SIONNACH -->
      <div class="house" data-points="275" data-max="500">
        <img src="images/sionnach.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(239,68,68,.8)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-red-950 via-red-600 to-orange-300 shadow-[0_0_28px_rgba(239,68,68,.9)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Sionnach</p>
      </div>

      <!-- EILC -->
      <div class="house" data-points="430" data-max="500">
        <img src="images/eilc.png" class="h-28 w-28 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(16,185,129,.8)]">
        <div class="relative h-[430px] w-24 mx-auto">
          <div class="absolute inset-0 rounded-full border border-white/45 glass-vial"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full overflow-hidden bg-gradient-to-t from-emerald-950 via-emerald-500 to-teal-300 shadow-[0_0_28px_rgba(16,185,129,.9)] transition-all duration-1000"></div>
          <div class="fill absolute bottom-4 left-3 right-3 rounded-b-full sparkle opacity-40"></div>
          <div class="absolute top-3 left-5 h-[340px] w-2 rounded-full bg-white/35 blur-sm"></div>
          <div class="absolute -bottom-5 left-1/2 h-12 w-32 -translate-x-1/2 rounded-t-3xl border border-yellow-400/40 bg-gradient-to-b from-yellow-500 via-yellow-800 to-stone-950"></div>
        </div>
        <p class="score mt-8 text-4xl font-black text-yellow-300">0</p>
        <p class="text-2xl font-black text-yellow-300">Eilc</p>
      </div>

    </div>
  </div>
</div>

<script>
  const houses = document.querySelectorAll(".house");

  houses.forEach((house) => {
    const points = Number(house.dataset.points);
    const max = Number(house.dataset.max);
    const percent = Math.min(points / max, 1) * 100;

    house.querySelectorAll(".fill").forEach((fill) => {
      fill.style.height = percent + "%";
    });

    house.querySelector(".score").textContent = points;
  });

  // Highlight leader
  let leader = [...houses].sort((a, b) => Number(b.dataset.points) - Number(a.dataset.points))[0];
  leader.classList.add("scale-105");
  leader.querySelector(".score").classList.add("text-white", "drop-shadow-[0_0_18px_rgba(250,204,21,1)]");
</script>

</body>
</html>
