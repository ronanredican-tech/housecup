<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT20L0oBN9KBmE6lxzRaCDKDGf69ViN4yVQeevVIJp3g3iLR1iR8pHCDfTKH3gExqIX8xtSPCtX__TT/pub?gid=1573990268&single=true&output=csv";

async function loadHouseTotals() {

  const response = await fetch(CSV_URL);
  const csvText = await response.text();

  const rows = csvText.trim().split("\n").slice(1);

  const totals = {};

  rows.forEach(row => {

    const [house, points] = row.split(",");

    totals[house.trim()] = Number(points.trim()) || 0;

  });

  const houses = document.querySelectorAll(".house");

  houses.forEach((house) => {

    const houseName = house.dataset.house;

    const points = totals[houseName] || 0;

    const max = Number(house.dataset.max);

    const percent = Math.max(
      6,
      Math.min(points / max, 1) * 100
    );

    house.querySelectorAll(".fill").forEach((fill) => {

      fill.style.height = percent + "%";

    });

    house.querySelector(".score").textContent = points;

  });

}

loadHouseTotals();

setInterval(loadHouseTotals, 30000);

</script>
