<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .glass-vial {
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,.28),
          rgba(255,255,255,.04) 18%,
          rgba(255,255,255,.02) 55%,
          rgba(255,255,255,.18)
        );
      box-shadow:
        inset 8px 0 14px rgba(255,255,255,.22),
        inset -10px 0 18px rgba(0,0,0,.55),
        0 0 22px rgba(255,255,255,.18);
    }

    .sparkle {
      background-image:
        radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);
      background-size: 14px 14px;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 0 0; }
      to { background-position: 30px -80px; }
    }

    .magic-burst {
      animation: magicBurst 2s ease-out;
    }

    @keyframes magicBurst {
      0% {
        transform: scale(1);
        filter: brightness(1);
      }
      35% {
        transform: scale(1.15);
        filter: brightness(2);
      }
      100% {
        transform: scale(1);
        filter: brightness(1);
      }
    }

    .magic-flash::after {
      content: "+ POINTS";
      position: absolute;
      left: 50%;
      top: 34%;
      transform: translateX(-50%);
      color: gold;
      font-size: 2.4rem;
      font-weight: 900;
      white-space: nowrap;
      text-shadow:
        0 0 15px gold,
        0 0 35px rgba(255,215,0,.9);
      animation: floatPoints 2s ease-out forwards;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes floatPoints {
      0% {
        opacity: 0;
        transform: translate(-50%, 30px) scale(.6);
      }
      25% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1.15);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -110px) scale(1);
      }
    }
  </style>
</head>

<script>
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT20L0oBN9KBmE6lxzRaCDKDGf69ViN4yVQeevVIJp3g3iLR1iR8pHCDfTKH3gExqIX8xtSPCtX__TT/pub?gid=1573990268&single=true&output=csv";

let previousTotals = {};
let firstLoad = true;

async function loadHouseTotals() {
  try {
    const response = await fetch(CSV_URL + "&cacheBust=" + Date.now());
    const csvText = await response.text();

    const rows = csvText.trim().split("\n").slice(1);
    const totals = {};

    rows.forEach(row => {
      const [house, points] = row.split(",");
      if (house && points !== undefined) {
        totals[house.trim()] = Number(points.trim()) || 0;
      }
    });

    const houses = document.querySelectorAll(".house");

    houses.forEach((house) => {
      const houseName = house.dataset.house;
      const points = totals[houseName] || 0;
      const oldPoints = previousTotals[houseName] ?? points;

      const max = Number(house.dataset.max);
      const percent = Math.max(6, Math.min(points / max, 1) * 100);

      house.querySelectorAll(".fill").forEach((fill) => {
        fill.style.height = percent + "%";
      });

      house.querySelector(".score").textContent = points;

      if (!firstLoad && points > oldPoints) {
        house.classList.remove("magic-burst", "magic-flash");
        void house.offsetWidth;
        house.classList.add("magic-burst", "magic-flash");

        setTimeout(() => {
          house.classList.remove("magic-burst", "magic-flash");
        }, 2000);
      }
    });

    previousTotals = totals;
    firstLoad = false;

  } catch (error) {
    console.error("Could not load house totals:", error);
  }
}

loadHouseTotals();
setInterval(loadHouseTotals, 3000);
</script>
