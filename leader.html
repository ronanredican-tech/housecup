<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mercy House Cup Leader Spotlight</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .sparkles {
      background-image: radial-gradient(circle, rgba(255,255,255,.85) 1px, transparent 2px);
      background-size: 34px 34px;
      animation: sparkleMove 18s linear infinite;
    }

    @keyframes sparkleMove {
      from { background-position: 0 0; }
      to { background-position: 260px -420px; }
    }

    .reveal {
      animation: reveal 2s ease-out forwards;
    }

    @keyframes reveal {
      0% { opacity: 0; transform: scale(.75) translateY(80px); filter: blur(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    .crestPulse {
      animation: crestPulse 3s ease-in-out infinite;
    }

    @keyframes crestPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.08); filter: brightness(1.7); }
    }

    .crownFloat {
      animation: crownFloat 3s ease-in-out infinite;
    }

    @keyframes crownFloat {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-16px) rotate(4deg); }
    }
  </style>
</head>

<body class="bg-black text-white font-serif overflow-hidden">

<div class="relative min-h-screen flex items-center justify-center">

  <!-- Background -->
  <div
    class="absolute inset-0 bg-cover bg-center"
    style="background-image:url('images/background.png');">
  </div>

  <div class="absolute inset-0 bg-black/60"></div>
  <div class="absolute inset-0 sparkles opacity-25"></div>

  <!-- Gold light -->
  <div class="absolute -top-52 left-1/2 h-[750px] w-[1000px] -translate-x-1/2 rounded-full bg-yellow-400/25 blur-[140px]"></div>

  <div class="relative z-10 w-full max-w-6xl text-center px-8 reveal">

    <p class="uppercase tracking-[0.7em] text-yellow-200 text-lg mb-6">
      Mercy House Cup
    </p>

    <h1
      class="text-5xl md:text-7xl font-black uppercase tracking-[0.18em] text-yellow-400 mb-12"
      style="text-shadow: 0 0 30px rgba(250,204,21,.95), 0 4px 0 #5c4308;">
      Current Leader
    </h1>

    <!-- Crest zone -->
    <div class="relative mx-auto mb-10 h-80 w-80 md:h-[430px] md:w-[430px] flex items-center justify-center">

      <div
        id="leaderGlow"
        class="absolute inset-0 rounded-full blur-[90px] opacity-90 bg-yellow-400">
      </div>

      <!-- Crown -->
      <div
        class="crownFloat absolute -top-20 left-1/2 z-30 -translate-x-1/2 text-8xl md:text-9xl drop-shadow-[0_0_25px_rgba(250,204,21,.9)]">
        👑
      </div>

      <img
        id="leaderCrest"
        src=""
        class="crestPulse relative z-20 h-full w-full object-contain drop-shadow-[0_0_65px_rgba(255,255,255,.85)]"
      >

    </div>

    <h2
      id="leaderName"
      class="text-6xl md:text-8xl font-black uppercase tracking-[0.16em] text-white mb-4"
      style="text-shadow: 0 0 35px rgba(255,255,255,.85);">
      Loading
    </h2>

    <p
      id="leaderClass"
      class="text-2xl md:text-3xl uppercase tracking-[0.5em] text-yellow-200 mb-8">
      Class
    </p>

    <p class="uppercase tracking-[0.5em] text-yellow-100/75 text-lg mb-3">
      Total Points
    </p>

    <p
      id="leaderScore"
      class="text-7xl md:text-9xl font-black text-yellow-400"
      style="text-shadow: 0 0 45px rgba(250,204,21,.95);">
      0
    </p>

    <p class="mt-12 uppercase tracking-[0.4em] text-yellow-100/70 text-sm md:text-base">
      The race continues...
    </p>

  </div>

</div>

<script>
const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT20L0oBN9KBmE6lxzRaCDKDGf69ViN4yVQeevVIJp3g3iLR1iR8pHCDfTKH3gExqIX8xtSPCtX__TT/pub?gid=1573990268&single=true&output=csv";

const houseInfo = {
  "Bradán": {
    crest: "images/bradan.png",
    className: "4.1",
    glow: "rgba(59,130,246,.95)"
  },
  "Broc": {
    crest: "images/broc.png",
    className: "4.2",
    glow: "rgba(209,213,219,.95)"
  },
  "Iolar": {
    crest: "images/iolar.png",
    className: "4.3",
    glow: "rgba(99,102,241,.95)"
  },
  "Giorria": {
    crest: "images/giorria.png",
    className: "4.4",
    glow: "rgba(34,197,94,.95)"
  },
  "Cú Faoil": {
    crest: "images/cu-faoil.png",
    className: "4.5",
    glow: "rgba(226,232,240,.95)"
  },
  "Sionnach": {
    crest: "images/sionnach.png",
    className: "4.6",
    glow: "rgba(239,68,68,.95)"
  },
  "Eilc": {
    crest: "images/eilc.png",
    className: "4.7",
    glow: "rgba(16,185,129,.95)"
  }
};

async function loadLeader() {
  const response = await fetch(CSV_URL + "&cacheBust=" + Date.now());
  const csvText = await response.text();

  const rows = csvText.trim().split("\n").slice(1);

  const totals = rows.map(row => {
    const [house, points] = row.split(",");
    return {
      house: house.trim(),
      points: Number(points.trim()) || 0
    };
  });

  totals.sort((a, b) => b.points - a.points);

  const leader = totals[0];
  const info = houseInfo[leader.house];

  document.getElementById("leaderName").textContent = leader.house;
  document.getElementById("leaderClass").textContent = info.className;
  document.getElementById("leaderScore").textContent = leader.points;
  document.getElementById("leaderCrest").src = info.crest;
  document.getElementById("leaderGlow").style.background = info.glow;
}

loadLeader();
setInterval(loadLeader, 30000);
</script>

</body>
</html>
