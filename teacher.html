<!DOCTYPE html>
<html>
<head>
  <title>Mercy House Cup Points</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-white/10 border border-yellow-500/30 rounded-2xl p-6 shadow-2xl">
    
    <h1 class="text-3xl font-black text-yellow-400 text-center mb-6">
      Mercy House Cup
    </h1>

    <label class="block mb-2">Teacher Name</label>
    <input id="teacher" class="w-full mb-4 p-3 rounded text-black" placeholder="e.g. Mr Smith">

    <label class="block mb-2">Student Name</label>
    <input id="student" class="w-full mb-4 p-3 rounded text-black" placeholder="e.g. Jack Murphy">

    <label class="block mb-2">House</label>
    <select id="house" class="w-full mb-4 p-3 rounded text-black">
      <option>Bradán</option>
      <option>Broc</option>
      <option>Iolar</option>
      <option>Giorria</option>
      <option>Cú Faoil</option>
      <option>Sionnach</option>
      <option>Eilc</option>
    </select>

    <label class="block mb-2">Points</label>
    <select id="points" class="w-full mb-4 p-3 rounded text-black">
      <option value="1">1 point</option>
      <option value="2">2 points</option>
      <option value="5">5 points</option>
      <option value="10">10 points</option>
    </select>

    <label class="block mb-2">Reason</label>
    <textarea id="reason" class="w-full mb-6 p-3 rounded text-black" placeholder="Reason for points"></textarea>

    <button onclick="submitPoints()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl">
      Submit Points
    </button>

    <p id="message" class="text-center mt-4 text-sm"></p>

  </div>

<script>
  const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

  async function submitPoints() {
    const data = {
      teacher: document.getElementById("teacher").value,
      student: document.getElementById("student").value,
      house: document.getElementById("house").value,
      points: document.getElementById("points").value,
      reason: document.getElementById("reason").value
    };

    document.getElementById("message").textContent = "Submitting...";

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });

      document.getElementById("message").textContent = "Points submitted successfully!";

      document.getElementById("student").value = "";
      document.getElementById("reason").value = "";

    } catch (error) {
      document.getElementById("message").textContent = "Something went wrong.";
    }
  }
</script>

</body>
</html>
