<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mercy House Cup Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
    }

    .glass {
      background: rgba(8, 5, 2, 0.62);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.35);
      box-shadow:
        0 40px 100px rgba(0,0,0,0.9),
        inset 0 0 40px rgba(255,255,255,0.06);
    }

    .float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: .55; }
      50% { transform: translateY(-18px); opacity: 1; }
    }

    .sparkles {
      background-image: radial-gradient(circle, rgba(255,255,255,.75) 1px, transparent 2px);
      background-size: 38px 38px;
      animation: drift 22s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 220px -300px; }
    }
  </style>
</head>

<body class="bg-black text-white overflow-x-hidden">

  <!-- Background -->
  <div 
    class="fixed inset-0 bg-cover bg-center"
    style="background-image: url('images/background.png');">
  </div>

  <!-- Dark overlay -->
  <div class="fixed inset-0 bg-black/55"></div>

  <!-- Sparkles -->
  <div class="fixed inset-0 sparkles opacity-25"></div>

  <!-- Gold glow -->
  <div class="fixed -top-40 left-1/2 h-[600px] w-[900px] -translate-x-1/2 rounded-full bg-yellow-500/20 blur-[130px]"></div>

  <!-- Page -->
  <main class="relative z-10 min-h-screen flex items-center justify-center p-4 md:p-8">

    <section class="glass w-full max-w-5xl rounded-[2rem] p-5 md:p-8">

      <!-- Header -->
      <div class="text-center mb-6">

        <img 
          src="images/school-crest.png"
          class="mx-auto mb-4 h-24 w-24 object-contain rounded-full bg-white/90 p-2 shadow-[0_0_35px_rgba(212,175,55,.85)]"
        />

        <p class="uppercase tracking-[0.55em] text-yellow-200 text-xs md:text-sm">
          Mercy Secondary School
        </p>

        <h1 
          class="mt-3 text-4xl md:text-6xl font-black uppercase tracking-[0.25em] text-yellow-400"
          style="text-shadow: 0 3px 0 #5c4308, 0 0 30px rgba(212,175,55,.75);"
        >
          House Cup
        </h1>

        <p class="mt-3 uppercase tracking-[0.35em] text-yellow-100/80 text-xs md:text-sm">
          Points Registry
        </p>
      </div>

      <!-- House crests row -->
      <div class="mb-6 grid grid-cols-7 gap-2 md:gap-4 items-center">
        <img src="images/bradan.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(59,130,246,.8)]">
        <img src="images/broc.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(229,231,235,.7)]" style="animation-delay:.3s">
        <img src="images/iolar.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(99,102,241,.8)]" style="animation-delay:.6s">
        <img src="images/giorria.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(34,197,94,.8)]" style="animation-delay:.9s">
        <img src="images/cu-faoil.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(226,232,240,.8)]" style="animation-delay:1.2s">
        <img src="images/sionnach.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(239,68,68,.8)]" style="animation-delay:1.5s">
        <img src="images/eilc.png" class="float h-12 md:h-16 object-contain mx-auto drop-shadow-[0_0_18px_rgba(16,185,129,.8)]" style="animation-delay:1.8s">
      </div>

      <!-- Form frame -->
      <div class="rounded-[1.5rem] overflow-hidden border border-yellow-400/30 bg-white shadow-2xl">

        <iframe
          src="https://docs.google.com/forms/d/e/1FAIpQLSdMeE50ixw_0JLyj4b6qmaTE0FUO_rh46BZDtsk4UpfrnLftQ/viewform?embedded=true"
          width="100%"
          height="1050"
          frameborder="0"
          marginheight="0"
          marginwidth="0">
          Loading…
        </iframe>

      </div>

      <p class="mt-5 text-center text-[10px] md:text-xs uppercase tracking-[0.4em] text-yellow-200/60">
        Respect • Excellence • Community • Compassion
      </p>

    </section>
  </main>

</body>
</html>
